name = "daya-memory-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
usage_model = "unbound"

[[kv_namespaces]]
binding = "DAYA_KV"
id = "7d313eeaaa5d4a50b3f779f9e0c7f180"

[triggers]
crons = ["0 */12 * * *", "0 1 * * *", "0 3 * * *"]

[[queues.producers]]
queue = "daya-email-queue"
binding = "EMAIL_QUEUE"

[[queues.consumers]]
queue = "daya-email-queue"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 3
max_concurrency = 1  # Serialize processing to prevent KV race in appendFacts (read-modify-write)

[[queues.producers]]
queue = "daya-report-queue"
binding = "REPORT_QUEUE"

[[queues.consumers]]
queue = "daya-report-queue"
max_batch_size = 1
max_retries = 1

[vars]
TELEGRAM_MEMORY_BOT_USERNAME = "DayaProjectBot"
ONEDRIVE_USER_EMAIL = "peterkimani@wearedaya.com"
ONEDRIVE_FILE_PATH = "Memory Worker/Project Memory.xlsx"
